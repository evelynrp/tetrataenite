# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
modules:
  - type: os-release
    properties:
      ID: fedora
      ID_LIKE: fedora
      NAME: tetrataenite
      PRETTY_NAME: tetrataenite

  - type: dnf
    repos:
      copr:
        - secureblue/packages
      files:
        - https://repository.mullvad.net/rpm/stable/mullvad.repo
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
        - vscode.repo
        - google-chrome.repo
    install:
      install-weak-deps: false
      packages:
        - bazaar
        - code
        - distrobox
        - google-chrome-stable
        - tetrataenite-logos-0.0.2-1.fc43.x86_64.rpm
        - ms-core-fonts
        - mullvad-vpn
        - vim
    remove:
      packages:
        - fedora-chromium-config
        - fedora-chromium-config-gnome
        - fedora-flathub-remote
        - fedora-third-party
        - fedora-workstation-repositories
        - firefox
        - firefox-langpacks

  - type: files
    files:
      - source: system
        destination: /

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          title: Flathub (system)
        install:
          - com.github.tchx84.Flatseal

  - type: fonts
    fonts:
      nerd-fonts:
        - Hack
        - NerdFontsSymbolsOnly

  - type: brew
    nofile-limits: true
    brew-analytics: false
    auto-update: true
    auto-upgrade: true

  - type: systemd
    system:
      enabled:
        - flatpak-system-update.timer

  - type: script
    scripts:
      - set-build-date.sh

  - type: initramfs

  - type: signing # this sets up the proper policy & signing files for signed images to work fully