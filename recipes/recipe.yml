---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: tetrataenite
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/blue-build/base-images/fedora-cosmic-nvidia-open
image-version: latest # latest is also supported if you want new updates ASAP
platforms:
  - linux/amd64

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: os-release
    properties:
      ID: fedora
      ID_LIKE: fedora
      NAME: tetrataenite
      PRETTY_NAME: tetrataenite

  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - lihaohong/yazi
        - secureblue/packages
      files:
        - https://repository.mullvad.net/rpm/stable/mullvad.repo
        - https://repo.secureblue.dev/secureblue.repo
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    install:
      install-weak-deps: false
      packages:
        - adw-gtk3-theme
        - bazaar
        - code
        - cosmic-player
        - distrobox
        - tetrataenite-logos-0.0.1-1.fc43.x86_64.rpm
        - ms-core-fonts
        - mullvad-vpn
        - NetworkManager-openvpn
        - NetworkManager-tui
        - trivalent
        - vim
        - yazi
    remove:
      packages:
        - cosmic-store
        - fedora-chromium-config
        - fedora-chromium-config-gnome
        - fedora-flathub-remote
        - fedora-third-party
        - fedora-workstation-repositories
        - firefox
        - firefox-langpacks

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        repo:
          title: Flathub (system)
        install:
          - com.github.tchx84.Flatseal
  
  - type: fonts
    fonts:
      nerd-fonts:
        - Hack
        - NerdFontsSymbolsOnly

  - type: brew
    nofile-limits: true
    brew-analytics: false
    auto-update: true
    auto-upgrade: true

  - type: initramfs

  - type: signing # this sets up the proper policy & signing files for signed images to work fully